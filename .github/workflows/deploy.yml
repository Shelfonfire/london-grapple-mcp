name: Deploy to AWS Lambda

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "716171483364"
  ECR_REPO: london-grapple-mcp
  LAMBDA_FUNCTION: london-grapple-mcp
  LAMBDA_ROLE: london-grapple-mcp-lambda-role

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repo if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_REPO --image-scanning-configuration scanOnPush=true

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build and push Docker image
        run: |
          IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Create IAM role if not exists
        run: |
          aws iam get-role --role-name $LAMBDA_ROLE 2>/dev/null || \
          aws iam create-role \
            --role-name $LAMBDA_ROLE \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "lambda.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }' && \
          aws iam attach-role-policy \
            --role-name $LAMBDA_ROLE \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole && \
          echo "Waiting for role propagation..." && sleep 10

      - name: Deploy Lambda function
        run: |
          IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
          ROLE_ARN=arn:aws:iam::$AWS_ACCOUNT_ID:role/$LAMBDA_ROLE

          # Check if function exists
          if aws lambda get-function --function-name $LAMBDA_FUNCTION 2>/dev/null; then
            echo "Updating existing function..."
            aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION \
              --image-uri $IMAGE_URI
            # Wait for update to complete
            aws lambda wait function-updated --function-name $LAMBDA_FUNCTION
            aws lambda update-function-configuration \
              --function-name $LAMBDA_FUNCTION \
              --timeout 30 \
              --memory-size 256 \
              --environment "Variables={MCP_TRANSPORT=sse,PORT=8080}"
          else
            echo "Creating new function..."
            aws lambda create-function \
              --function-name $LAMBDA_FUNCTION \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role $ROLE_ARN \
              --timeout 300 \
              --memory-size 256 \
              --environment "Variables={MCP_TRANSPORT=sse,PORT=8080}"
            aws lambda wait function-active --function-name $LAMBDA_FUNCTION
          fi

      - name: Create Function URL with streaming
        run: |
          if aws lambda get-function-url-config --function-name $LAMBDA_FUNCTION 2>/dev/null; then
            echo "Function URL already exists"
          else
            aws lambda add-permission \
              --function-name $LAMBDA_FUNCTION \
              --statement-id FunctionURLPublicAccess \
              --action lambda:InvokeFunctionUrl \
              --principal "*" \
              --function-url-auth-type NONE
            aws lambda create-function-url-config \
              --function-name $LAMBDA_FUNCTION \
              --auth-type NONE \
              --invoke-mode RESPONSE_STREAM
          fi

      - name: Print Function URL
        run: |
          URL=$(aws lambda get-function-url-config --function-name $LAMBDA_FUNCTION --query 'FunctionUrl' --output text)
          echo "Function URL: $URL"
